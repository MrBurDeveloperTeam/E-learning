<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>DentalLearn — Dental Video Community</title>
    <meta name="description"
          content="Watch and share clinical dental videos. A professional community for dentists, specialists, and dental professionals across Malaysia and Southeast Asia." />
    <meta name="keywords"
          content="dental education, dental videos, dental CPD, dentist Malaysia, dental community, clinical dentistry, dental training" />
    <meta name="author" content="DentalLearn" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DentalLearn — Dental Video Community" />
    <meta property="og:description"
          content="Watch and share clinical dental videos from verified dental professionals." />
    <meta property="og:url" content="https://dentallearn.com" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="en_MY" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DentalLearn — Dental Video Community" />
    <meta name="twitter:description"
          content="Watch and share clinical dental videos from verified dental professionals." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme colour (browser chrome on mobile) -->
    <meta name="theme-color" content="#88C1BD" />

    <!-- Apple mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DentalLearn" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://stream.mux.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
